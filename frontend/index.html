<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/images/echium_icon_192.png" />
    <meta name="theme-color" content="#1E1438" />
    <!-- iOS home-screen (PWA) support: iOS ignores the web app manifest for
         standalone launch, so these apple-* tags are what make "Add to Home
         Screen" open Echium as a full-screen app with the right title/icon. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Echium AI" />
    <meta name="robots" content="noindex,nofollow">
  </head>
  <body class="min-h-dvh font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" onerror="window.location.reload(true)"></script>
    <!-- Vite＋AmplifyUIの際は以下の設定が必要 -->
    <script>
      window.global = window;
      window.process = {
        env: { DEBUG: undefined },
      }
      var exports = {};
    </script>
  </body>
</html>

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  One-time setup for GitHub Actions to deploy this app via OIDC.
  Creates the GitHub OIDC identity provider (if missing) and an IAM role
  trusted only to a specific GitHub repo. The role is granted the permissions
  CDK needs to deploy this stack.

Parameters:
  GitHubOrg:
    Type: String
    Default: EchiumAI
    Description: GitHub organization or username that owns the repo.

  GitHubRepo:
    Type: String
    Default: echium-chat
    Description: Repository name (without the org prefix).

  RoleName:
    Type: String
    Default: github-actions-echium-deploy
    Description: Name for the IAM role that GitHub Actions will assume.

  CreateOidcProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set to 'false' if your account already has the GitHub OIDC provider
      (token.actions.githubusercontent.com). Only one is allowed per account.

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, 'true']

Resources:
  # GitHub's OIDC identity provider. One per AWS account, idempotent across stacks.
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # GitHub publishes these thumbprints; AWS also verifies the cert chain
      # automatically since 2023, so any valid value here is accepted.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # The role GitHub Actions assumes via OIDC.
  # Trust is locked to the specific GitHub repo. Permissions are broad
  # (AdministratorAccess) because CDK needs to provision diverse resources
  # (CloudFront, Cognito, Lambda, IAM, OpenSearch, etc.). The trust policy
  # is the security boundary, not the permission policy.
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: !Sub 'Assumed by GitHub Actions in ${GitHubOrg}/${GitHubRepo} to run cdk deploy.'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Restrict to this specific repo. To allow all branches/tags use `*`.
                # Tighten further (e.g. only on tagged releases) by replacing
                # `*` with `ref:refs/tags/v*` etc.
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  RoleArn:
    Description: ARN to use in the GitHub Actions workflow's role-to-assume.
    Value: !GetAtt GitHubActionsDeployRole.Arn

  RoleName:
    Description: Name of the IAM role.
    Value: !Ref GitHubActionsDeployRole
